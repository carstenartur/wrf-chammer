name: Docker Reproducible Build

on:
  pull_request:
  push:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag wrf-reproducible .

      - name: Verify WRF binaries
        run: |
          docker run --rm wrf-reproducible test -e /opt/wrf/run/real.exe
          docker run --rm wrf-reproducible test -e /opt/wrf/run/wrf.exe
