name: Docker Reproducible Build

on:
  pull_request:
  push:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build --tag wrf-reproducible .

      - name: Verify runtime dependencies and startup
        run: docker run --rm wrf-reproducible /usr/local/bin/verify-wrf-runtime.sh

      - name: Run WRF smoke-test simulation
        run: docker run --rm wrf-reproducible /usr/local/bin/smoke-test-wrf.sh
